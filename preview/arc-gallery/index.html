<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Work gallery preview — Fusion Creative</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #000; color: var(--off-white); font-family: var(--font-head); }

  .arc-hero {
    position: relative; min-height: 100vh; overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    background: radial-gradient(120% 90% at 50% 8%, #1c0e0c 0%, #000 58%);
    padding: 70px 16px 90px;
  }
  .arc-wrap { position: relative; width: 100%; max-width: 1200px; }
  .arc-pivot { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); }

  .arc-card { position: absolute; }
  .arc-fade { width: 100%; height: 100%; opacity: 0; animation: arcUp .8s ease-out forwards; }
  .arc-inner {
    width: 100%; height: 100%; border-radius: 18px; overflow: hidden; position: relative;
    background: #1c1c1c; border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 16px 36px rgba(0,0,0,.55); transition: transform .35s ease, box-shadow .35s ease;
  }
  .arc-card:hover { z-index: 999 !important; }
  .arc-card:hover .arc-inner { transform: scale(1.08); box-shadow: 0 24px 50px rgba(230,59,46,.28); border-color: rgba(230,59,46,.5); }
  .arc-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .vbadge {
    position: absolute; left: 6px; bottom: 6px; display: flex; align-items: center; gap: 4px;
    background: rgba(0,0,0,.6); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    color: #fff; font-family: var(--font-mono); font-size: .62rem; font-weight: 700; line-height: 1;
    padding: 4px 8px 4px 6px; border-radius: 99px; border: 1px solid rgba(255,255,255,.12);
  }
  .vbadge svg { width: 11px; height: 11px; color: var(--signal); flex: none; }

  @keyframes arcUp { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }

  .arc-content { position: relative; z-index: 10; text-align: center; max-width: 46rem; padding: 0 20px; margin-top: -40px; opacity: 0; animation: arcUp .8s ease-out 1s forwards; }
  .arc-eyebrow { font-family: var(--font-mono); font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: var(--signal); margin: 0 0 16px; }
  .arc-content h1 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(2.4rem, 6vw, 4.6rem); line-height: 1.04; letter-spacing: -.02em; margin: 0; }
  .arc-content h1 em { color: var(--signal); font-style: normal; }
  .arc-content p { color: rgba(245,243,238,.72); font-size: 1.08rem; line-height: 1.7; max-width: 36rem; margin: 18px auto 0; }
  .arc-ctas { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
  .arc-btn { font-family: var(--font-head); font-weight: 600; font-size: .95rem; padding: 13px 26px; border-radius: 99px; text-decoration: none; transition: transform .2s ease, background .2s ease, border-color .2s; }
  .arc-btn.primary { background: var(--signal); color: #fff; }
  .arc-btn.primary:hover { transform: translateY(-2px); }
  .arc-btn.ghost { color: var(--off-white); border: 1px solid rgba(255,255,255,.22); }
  .arc-btn.ghost:hover { border-color: var(--off-white); }
</style>
</head>
<body>

  <section class="arc-hero">
    <div class="arc-wrap" id="arcWrap">
      <div class="arc-pivot" id="arcPivot"></div>
    </div>

    <div class="arc-content">
      <p class="arc-eyebrow">Our work &middot; Real view counts</p>
      <h1>Content people <em>actually watch.</em></h1>
      <p>Short-form video for restaurants and brands across the North East and the UK. Every thumbnail above is a real post we made, with its real view count.</p>
      <div class="arc-ctas">
        <a href="/case-studies" class="arc-btn primary">See the case studies</a>
        <a href="/contact" class="arc-btn ghost">Start a project</a>
      </div>
    </div>
  </section>

  <script>
    var ITEMS = [
      { src: '/assets/showcase/01.jpg', views: 69702430, f: '69.7M', brand: 'New Greek' },
      { src: '/assets/showcase/02.jpg', views: 7053986,  f: '7.1M',  brand: 'New Greek' },
      { src: '/assets/showcase/03.jpg', views: 1833266,  f: '1.8M',  brand: 'Takdir' },
      { src: '/assets/showcase/04.jpg', views: 1136284,  f: '1.1M',  brand: 'Takdir' },
      { src: '/assets/showcase/05.jpg', views: 825000,   f: '825K',  brand: 'New Greek' },
      { src: '/assets/showcase/06.jpg', views: 366007,   f: '366K',  brand: 'New Greek' },
      { src: '/assets/showcase/07.jpg', views: 217477,   f: '217K',  brand: 'New Greek' },
      { src: '/assets/showcase/08.jpg', views: 160454,   f: '160K',  brand: 'Takdir' },
      { src: '/assets/showcase/09.jpg', views: 83797,    f: '84K',   brand: 'New Greek' },
      { src: '/assets/showcase/10.jpg', views: 73185,    f: '73K',   brand: 'Takdir' },
      { src: '/assets/showcase/11.jpg', views: 65033,    f: '65K',   brand: 'Takdir' },
      { src: '/assets/showcase/12.jpg', views: 58073,    f: '58K',   brand: 'New Greek Bakery' },
      { src: '/assets/showcase/13.jpg', views: 57301,    f: '57K',   brand: 'Takdir' },
      { src: '/assets/showcase/14.jpg', views: 50160,    f: '50K',   brand: 'New Greek' }
    ];
    var START = 16, END = 164;
    var pivot = document.getElementById('arcPivot');
    var wrap = document.getElementById('arcWrap');
    var EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/></svg>';

    function dims() {
      var w = window.innerWidth;
      if (w < 640) return { r: 188, c: 64 };
      if (w < 1024) return { r: 330, c: 96 };
      return { r: 460, c: 122 };
    }
    function arrange(items) {
      // biggest view count at top-centre, alternating outward
      var s = items.slice().sort(function (a, b) { return b.views - a.views; });
      var n = s.length, out = new Array(n), c = Math.floor((n - 1) / 2), l = c, r = c;
      out[c] = s[0];
      for (var k = 1; k < n; k++) { if (k % 2) { r++; out[r] = s[k]; } else { l--; out[l] = s[k]; } }
      return out;
    }
    function build() {
      var d = dims(), n = ITEMS.length, step = (END - START) / (n - 1);
      var order = arrange(ITEMS);
      pivot.innerHTML = '';
      for (var i = 0; i < n; i++) {
        var it = order[i];
        var a = START + step * i, rad = a * Math.PI / 180;
        var x = Math.cos(rad) * d.r, y = Math.sin(rad) * d.r;
        var tilt = (a - 90) * 0.5;
        var card = document.createElement('div');
        card.className = 'arc-card';
        card.style.cssText = 'width:' + d.c + 'px;height:' + d.c + 'px;left:calc(50% + ' + x + 'px);bottom:' + y + 'px;transform:translate(-50%,50%);z-index:' + (n - Math.abs(i - (n - 1) / 2) | 0);
        card.innerHTML = '<div class="arc-fade" style="animation-delay:' + (i * 60) + 'ms"><div class="arc-inner" style="transform:rotate(' + tilt + 'deg)"><img src="' + it.src + '" loading="lazy" alt="' + it.brand + '"><span class="vbadge">' + EYE + it.f + '</span></div></div>';
        pivot.appendChild(card);
      }
      wrap.style.height = (d.r * 0.72 + d.c) + 'px';
    }
    var t;
    window.addEventListener('resize', function () { clearTimeout(t); t = setTimeout(build, 150); });
    build();
  </script>
</body>
</html>
